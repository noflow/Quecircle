services:
  - type: web
    runtime: node
    name: quecircle
    plan: starter
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: TMDB_API_READ_ACCESS_TOKEN
        sync: false
